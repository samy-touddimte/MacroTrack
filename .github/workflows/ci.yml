name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./macrotrack-backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: macrotrack_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test with Maven
        run: mvn -B clean verify
        env:
          DB_PASSWORD: test_password
          JWT_SECRET: super_secret_test_key_for_ci_pipeline_only_256_bits
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/macrotrack_test
          SPRING_DATASOURCE_USERNAME: test_user

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./macrotrack-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./macrotrack-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type Check & Build
        run: npm run build
