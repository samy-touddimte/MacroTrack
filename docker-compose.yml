version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: macrotrack
      POSTGRES_USER: macrotrack
      POSTGRES_PASSWORD: macrotrack
    ports:
      - "5432:5432"
    volumes:
      - macrotrack_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrotrack"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./macrotrack-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/macrotrack
      SPRING_DATASOURCE_USERNAME: macrotrack
      SPRING_DATASOURCE_PASSWORD: macrotrack
      JWT_SECRET: your-secret-key-here-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./macrotrack-backend/logs:/app/logs

  frontend:
    build:
      context: ./macrotrack-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  macrotrack_data: