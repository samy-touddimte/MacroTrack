spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
server.port=8080
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
app.nutrition.macro-ratios.protein=0.30
app.nutrition.macro-ratios.fat=0.25
app.nutrition.macro-ratios.carbs=0.45
app.nutrition.kcal-per-gram.protein=4
app.nutrition.kcal-per-gram.fat=9
app.nutrition.kcal-per-gram.carbs=4

# url du frontend — changer en prod
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173}

# limit pagination max size
spring.data.web.pageable.max-page-size=100

# Proxy header resolution
server.forward-headers-strategy=framework

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=MacroTrack
info.app.version=1.0
app.rate-limit.rpm=200
